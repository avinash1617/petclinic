apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: My workflow
on:
  push:
    branches:
      - "**"
jobs:
  build:
    steps:
       - name: Checkout Code
         kind: git
         uses: https://github.com/avinash1617/petclinic.git
         with:
          ref: main
          
       - name: Maven Build
         kind: build
         uses: docker://maven:3.9.14-eclipse-temurin-17
         run: mvn clean install
